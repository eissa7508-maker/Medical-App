<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- السطر الأساسي لضبط أبعاد الشاشة على الموبايل والتلفونات -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة بخت الرضا - نظام خبير تشخيص أمراض الباطنية</title>
    <style>
        body {
            background-color: #011c16;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* الهيدر العلوي الأصلي */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #011c16;
        }

        .header-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* تنسيق الأزرار العلوية */
        .btn-top {
            background-color: rgba(3, 36, 27, 0.6);
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-logout {
            background-color: rgba(204, 51, 68, 0.2);
            border-color: #ff4d6d;
            color: #ff4d6d;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .university-title h1 {
            font-size: 26px;
            margin: 0;
            color: #ffffff;
            text-align: right;
        }

        .university-title p {
            font-size: 13px;
            color: #00ffcc;
            margin: 5px 0 0 0;
            text-align: right;
            opacity: 0.8;
        }

        .avatar-h {
            background-color: #00ffcc;
            color: #011c16;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        /* الحاوية الرئيسية المرنة الموزعة بالعرض للكمبيوتر */
        .main-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            padding: 40px;
            max-width: 1300px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* كرت إدخال الأعراض (اليسار في الكمبيوتر) */
        .symptoms-card {
            flex: 1.3;
            background-color: #022920;
            border: 1px solid rgba(0, 255, 204, 0.15);
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .textarea-wrapper {
            background-color: #011c16;
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 15px;
            padding: 15px;
            position: relative;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 15px;
            resize: none;
            outline: none;
            text-align: right;
            font-family: inherit;
        }

        /* زر التحليل الأصلي باللون الفيروزي المميز */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #00bfa5, #00ffcc);
            color: #011c16;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
            transition: 0.3s;
        }

        .btn-submit:hover {
            box-shadow: 0 0 20px #00ffcc;
            transform: translateY(-1px);
        }

        /* كرت لوحة الفرز (اليمين في الكمبيوتر) */
        .sorting-card {
            flex: 1;
            background-color: #022920;
            border: 1px solid rgba(0, 255, 204, 0.15);
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
        }

        .sorting-title {
            color: #00ffcc;
            font-size: 16px;
            margin-bottom: 25px;
            text-align: right;
        }

        /* توزيع الكروت الثلاثة الداخلية */
        .sub-cards-grid {
            display: flex;
            gap: 15px;
            justify-content: space-between;
        }

        .sub-card {
            flex: 1;
            background-color: rgba(1, 28, 22, 0.6);
            border: 1px solid rgba(0, 255, 204, 0.1);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .sub-card:hover {
            border-color: #00ffcc;
            background-color: #011c16;
        }

        .sub-card-icon {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .sub-card-text {
            font-size: 14px;
            color: #ffffff;
            font-weight: 500;
        }

        /* 📱 تحويل التنسيق بالكامل ليصبح متجاوباً في التلفون */
        @media (max-width: 900px) {
            .header {
                flex-direction: column-reverse;
                gap: 20px;
                padding: 20px;
            }
            .header-left {
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
            }
            .header-right {
                width: 100%;
                justify-content: space-between;
            }
            .university-title h1 {
                font-size: 22px;
            }
            .main-layout {
                flex-direction: column-reverse; /* ترتيب الكروت رأسياً للموبايل */
                padding: 15px;
                gap: 20px;
            }
            .symptoms-card, .sorting-card {
                width: 100% !important; /* ملء كامل عرض شاشة الموبايل */
                padding: 20px;
            }
            .sub-cards-grid {
                gap: 10px;
            }
            .sub-card {
                padding: 15px 5px;
            }
            .sub-card-text {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- الهيدر الأصلي المتطابق بالكامل -->
    <div class="header">
        <div class="header-left">
            <a href="/" class="btn-top btn-logout">🚪 خروج</a>
            <button class="btn-top">ℹ️ بيانات التطبيق</button>
            <button class="btn-top">🌙 الوضع المضيء</button>
            <button class="btn-top">🌐 English</button>
        </div>
        <div class="header-right">
            <div class="university-title">
                <h1>جامعة bخت الرضا</h1>
                <p>كلية علوم الحاسوب وتقانة المعلومات - نظام خبير تشخيص أمراض الباطنية</p>
            </div>
            <div class="avatar-h">H</div>
        </div>
    </div>

    <!-- التخطيط الرئيسي المرن والمحمي من الانكماش -->
    <div class="main-layout">
        
        <!-- كرت إدخال الأعراض (اليسار) -->
        <div class="symptoms-card">
            <div class="card-title">
                <span>📋</span> ادخل الأعراض الباطنية بالتفصيل لتحديد التوصية المختبرية الفورية
            </div>
            <form action="{{ url_for('results') }}" method="POST">
                <div class="textarea-wrapper">
                    <!-- نفس النص الافتراضي الظاهر في صورتك الأصلية بالظبط -->
                    <textarea name="symptoms" required placeholder="حمى داخلية مستمرة وقشعريرة بالجسد"></textarea>
                </div>
                <button type="submit" class="btn-submit">🪄 تحليل الأعراض فوراً</button>
            </form>
        </div>

        <!-- كرت لوحة الفرز (اليمين) -->
        <div class="sorting-card">
            <div class="sorting-title">لوحة فرز ومساعدة سريعة:</div>
            <div class="sub-cards-grid">
                <div class="sub-card">
                    <div class="sub-card-icon">🩺</div>
                    <div class="sub-card-text">الجهاز الهضمي والمعدة</div>
                </div>
                <div class="sub-card">
                    <div class="sub-card-icon">🌡️</div>
                    <div class="sub-card-text">الحميات الباطنية</div>
                </div>
                <div class="sub-card">
                    <div class="sub-card-icon">⚙️</div>
                    <div class="sub-card-text">القولون والأمعاء</div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
