<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تسجيل الدخول - طبيب الرفاق</title>
    <style>
        body { 
            background: linear-gradient(135deg, #052419, #0b3c29, #16533c); 
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; color: #fff;
        }
        .login-wrapper {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 45px 35px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4); text-align: center; box-sizing: border-box;
        }
        h2 { color: #00ffcc; margin: 0 0 8px 0; font-size: 26px; }
        p { color: rgba(255,255,255,0.5); font-size: 14px; margin: 0 0 35px 0; }
        .input-box { margin-bottom: 22px; text-align: right; }
        label { display: block; margin-bottom: 9px; color: #00ffcc; font-size: 14px; font-weight: 500; }
        input {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(5, 36, 25, 0.6); color: #fff; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }
        .action-btn {
            width: 100%; padding: 15px; border: none; border-radius: 10px; background: linear-gradient(45deg, #00ffcc, #00b386);
            color: #052419; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 255, 204, 0.4); }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <h2>تسجيل الدخول</h2>
        <p>نظام طبيب الرفاق الاستشاري الذكي</p>
        <form onsubmit="event.preventDefault(); location.href='/dashboard';">
            <div class="input-box"><label>اسم المستخدم السحابي:</label><input type="text" placeholder="أدخل اسم المستخدم" required></div>
            <div class="input-box"><label>كلمة المرور الآمنة:</label><input type="password" placeholder="أدخل كلمة المرور" required></div>
            <button type="submit" class="action-btn">دخول للمنظومة 🔑</button>
        </form>
    </div>
</body>
</html>
