<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة بخت الرضا - تسجيل الدخول</title>
    <style>
        :root {
            --primary-bg: #011c16;
            --card-bg: #022920;
            --accent-glow: #00ffcc;
            --accent-dark: #00bfa5;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #023328 0%, #011c16 100%);
        }

        .login-container {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-glow);
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.3);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo-icon {
            font-size: 50px;
            color: var(--accent-glow);
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            font-size: 26px;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 14px;
            color: var(--accent-dark);
            margin: 0 0 30px 0;
        }

        .form-group {
            text-align: right;
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--accent-glow);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper span {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-dark);
        }

        .form-group input {
            width: 100%;
            background-color: rgba(1, 28, 22, 0.8);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 10px;
            padding: 12px 45px 12px 15px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            outline: none;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent-glow));
            color: var(--primary-bg);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        .form-footer {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .form-footer a {
            color: var(--accent-dark);
            text-decoration: none;
            transition: 0.3s;
        }

        .form-footer a:hover {
            color: var(--accent-glow);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-icon">🎓</div>
        <h1>جامعة بخت الرضا</h1>
        <p class="subtitle">كلية علوم الحاسوب وتقانة المعلومات</p>

        <form action="{{ url_for('dashboard') }}" method="GET">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <div class="input-wrapper">
                    <span>👤</span>
                    <input type="text" placeholder="أدخل اسم المستخدم..." required>
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <span>🔒</span>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login">تسجيل الدخول للمنظومة 🔐</button>
        </form>

        <div class="form-footer">
            <a href="javascript:void(0);" onclick="window.location.href='{{ url_for('register') }}';" style="cursor: pointer; color: #00ffcc; text-decoration: none; font-weight: bold;">إنشاء حساب جديد</a>
            <a href="javascript:void(0);" onclick="alert('🔄 خدمة استعادة كلمة المرور غير متوفرة رقمياً حالياً، يرجى مراجعة إدارة مسجل الكلية للدعم الفني.');" style="color: var(--accent-dark);">نسيت كلمة المرور؟</a>
        </div>
    </div>

</body>
</html>
