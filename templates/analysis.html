<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة بخت الرضا - وحدة استقبال الأعراض</title>
    <style>
        body {
            background-color: #011c16;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .input-card-box {
            width: 100%;
            max-width: 650px;
            background: linear-gradient(145deg, #022920, #01211a);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 24px;
            padding: 40px;
            margin: 20px;
            box-sizing: border-box;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .card-headline {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            line-height: 1.5;
        }

        .text-area-holder {
            background-color: #011c16;
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            resize: none;
            outline: none;
            text-align: right;
            font-family: inherit;
            line-height: 1.6;
        }

        .btn-trigger-analysis {
            width: 100%;
            background: linear-gradient(135deg, #00bfa5, #00ffcc);
            color: #011c16;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
            transition: 0.3s;
        }

        .btn-trigger-analysis:hover {
            box-shadow: 0 0 25px #00ffcc;
            transform: translateY(-2px);
        }

        /* 🎬 شاشة التحميل والأنميشن */
        #loading-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #011c16;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader-heartbeat {
            font-size: 80px;
            animation: beatEffect 0.7s infinite alternate ease-in-out;
        }

        @keyframes beatEffect {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(0, 255, 204, 0.4); }
            100% { transform: scale(1.3); text-shadow: 0 0 35px #00ffcc; }
        }

        .loading-title {
            margin-top: 30px;
            color: #00ffcc;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
    </style>
    <script>
        function triggerLoadingScreen() {
            document.getElementById('loading-screen').style.display = 'flex';
            document.getElementById('main-container-box').style.display = 'none';
            return true;
        }
    </script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-heartbeat">❤️‍🩹</div>
        <div class="loading-title">جاري تشغيل المعالجة الاستدلالية وفحص الأعراض الباطنية...</div>
    </div>

    <div class="input-card-box" id="main-container-box">
        <div class="card-headline">
            <span>📲</span> ادخل الأعراض الباطنية بالتفصيل لتحديد التوصية المختبرية الفورية
        </div>
        
        <form action="{{ url_for('results') }}" method="POST" onsubmit="triggerLoadingScreen()">
            <div class="text-area-holder">
                <textarea name="symptoms" required placeholder="{{ placeholder_text if placeholder_text else 'حمى داخلية مستمرة وقشعريرة بالجسد' }}"></textarea>
            </div>
            <button type="submit" class="btn-trigger-analysis">🪄 تحليل الأعراض فوراً</button>
        </form>
        
        <a href="{{ url_for('dashboard') }}" style="color: #00ffcc; display: block; text-align: center; margin-top: 25px; text-decoration: none; font-size: 14px;">⬅️ إلغاء والعودة للرئيسية</a>
    </div>

</body>
</html>
